name: AI Agent

on:
  repository_dispatch:
    types: [ask_ai]
  workflow_dispatch:
    inputs:
      question:
        description: 'Question to ask'
        required: true
        type: string

concurrency:
  group: ai-agent
  cancel-in-progress: false

jobs:
  answer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          AI_QUESTION: ${{ github.event.inputs.question }}
        run: |
          python agent/main.py

      - name: Commit reply
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"
          git add memory/chat_history.json memory/latest_reply.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ai: reply [$(date -u +%FT%TZ)]"
            git push
          fi
